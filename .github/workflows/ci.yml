name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift ${{ matrix.swift }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple platforms (Xcode selects the Swift version)
          - os: macos-14
            swift: "5.10"
          - os: macos-15
            swift: "6.0"
          # Linux — ensures Foundation-layer differences are caught
          - os: ubuntu-22.04
            swift: "5.10"
          - os: ubuntu-22.04
            swift: "6.0"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (macOS only)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift }}

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test
